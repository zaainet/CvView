<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>နောင်ထိပ်တင် - Master Admin Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Pyidaungsu', serif; background-color: #050505; color: #eee; }
        .gold-text { color: #ffcf40; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 207, 64, 0.1); border-radius: 20px; }
        .btn-action { transition: 0.3s; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        tr { background: rgba(255, 255, 255, 0.02); }
        td { padding: 12px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-black gold-text tracking-tighter">ADMIN COMMAND</h1>
            <p class="text-white/40 text-sm italic">“ ဓားထက်ထက်နဲ့ စာရင်းကို စီမံပါ ”</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
            <div class="card p-6 border-l-4 border-l-amber-500">
                <p class="text-[10px] text-white/30 uppercase tracking-[2px]">လက်ရှိကျန်သူ (Pending)</p>
                <h2 id="pendingCount" class="text-4xl font-black gold-text mt-2">0</h2>
            </div>
            <div class="card p-6 border-l-4 border-l-green-500">
                <p class="text-[10px] text-white/30 uppercase tracking-[2px]">ပြီးစီးသူ (Done)</p>
                <h2 id="doneCount" class="text-4xl font-black text-green-500 mt-2">0</h2>
            </div>
            <button onclick="fetchData()" class="card p-6 flex items-center justify-center hover:bg-white/5 transition">
                <i class="fa-solid fa-rotate text-2xl gold-text"></i>
                <span class="ml-3 font-bold uppercase text-[10px]">Refresh List</span>
            </button>
        </div>

        <div class="overflow-x-auto">
            <table id="masterTable">
                <thead>
                    <tr class="bg-transparent text-[10px] text-gold/50 uppercase tracking-widest">
                        <th class="p-4 text-left">Customer Information</th>
                        <th class="p-4 text-left">Topic</th>
                        <th class="p-4 text-left">Status</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" class="text-center py-20 opacity-30">စာရင်းဆွဲယူနေသည်...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/hgitfd6aa9ymz";

        async function fetchData() {
            const tbody = document.getElementById('tableBody');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // စာရင်းခွဲခြားတွက်ချက်ခြင်း
                const pending = data.filter(i => i.Status !== "Done");
                const done = data.filter(i => i.Status === "Done");
                
                document.getElementById('pendingCount').innerText = pending.length;
                document.getElementById('doneCount').innerText = done.length;

                tbody.innerHTML = "";
                
                // စာရင်းအသစ်ကို အပေါ်ဆုံးကပြမယ်
                data.reverse().forEach(item => {
                    const isDone = item.Status === "Done";
                    tbody.innerHTML += `
                        <tr class="${isDone ? 'opacity-40 grayscale' : ''}">
                            <td>
                                <div class="font-bold text-white text-lg">${item.အမည်}</div>
                                <div class="text-[11px] text-white/40">${item.နေ့နံ} | ${item.ဖုန်း}</div>
                            </td>
                            <td><span class="text-gold/80 text-sm">${item.သိလိုသည်}</span></td>
                            <td>
                                <span class="px-3 py-1 rounded-full text-[10px] font-bold ${isDone ? 'bg-green-500/20 text-green-500' : 'bg-amber-500/20 text-amber-500'}">
                                    ${isDone ? 'ပြီးစီး' : 'စောင့်ဆိုင်း'}
                                </span>
                            </td>
                            <td class="text-right space-x-1">
                                ${!isDone ? `
                                <button onclick="markDone('${item.ID}')" class="btn-action bg-green-600/20 text-green-500 hover:bg-green-600 hover:text-white">
                                    <i class="fa-solid fa-check"></i> ပြီးပြီ
                                </button>` : ''}
                                <button onclick="deleteEntry('${item.ID}')" class="btn-action bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-20 text-red-500">ချိတ်ဆက်မှု မအောင်မြင်ပါ။</td></tr>`;
            }
        }

        // Status ပြောင်းလဲခြင်း
        async function markDone(id) {
            try {
                await fetch(`${API_URL}/ID/${id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"data": {"Status": "Done"}})
                });
                fetchData();
            } catch (e) { Swal.fire('Error', 'မအောင်မြင်ပါ', 'error'); }
        }

        // စာရင်းဖျက်ခြင်း
        async function deleteEntry(id) {
            const confirm = await Swal.fire({
                title: 'သေချာလား?', text: "ဒီစာရင်းကို လုံးဝဖျက်ပစ်မှာနော်။", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ဖျက်မည်', background: '#111', color: '#fff'
            });
            if (confirm.isConfirmed) {
                try {
                    await fetch(`${API_URL}/ID/${id}`, { method: 'DELETE' });
                    fetchData();
                } catch (e) { Swal.fire('Error', 'မအောင်မြင်ပါ', 'error'); }
            }
        }

        fetchData();
    </script>
</body>
</html>
