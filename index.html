<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>သင်တန်းသားစာရင်း</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap');

        body {
            background-color: #f4f7f6;
            font-family: 'Pyidaungsu', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h2 { color: #2c3e50; margin: 0; }

        .search-box {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            width: 250px;
            outline: none;
        }

        /* Table Style */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #2c3e50;
            color: #ffffff;
            text-align: left;
            padding: 12px;
            font-weight: normal;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #444;
            font-size: 0.95rem;
        }

        tr:hover { background-color: #f9f9f9; }

        .loading {
            text-align: center;
            padding: 40px;
            font-style: italic;
            color: #888;
        }

        /* Badge Style for Days */
        .badge {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            background: #d4af37;
            color: #000;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h2>သင်တန်းသား မှတ်တမ်းများ</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="အမည်ဖြင့် ရှာရန်...">
    </div>

    <div class="table-wrapper">
        <table id="studentTable">
            <thead>
                <tr>
                    <th>အမည်</th>
                    <th>နေ့နံ</th>
                    <th>မွေးသက္ကရာဇ်</th>
                    <th>ဆက်သွယ်ရန်</th>
                    <th>ရည်ရွယ်ချက်</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="5" class="loading">ဒေတာများကို ဆွဲယူနေပါသည်...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const apiURL = 'https://sheetdb.io/api/v1/3adn8dh4ee5qp';
    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    let allData = [];

    // ဒေတာများ ဆွဲယူရန် function
    async function fetchData() {
        try {
            const response = await fetch(apiURL);
            allData = await response.json();
            displayData(allData);
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">ဒေတာဆွဲယူ၍ မရနိုင်ပါ</td></tr>`;
        }
    }

    // ဒေတာများကို ဇယားထဲ ထည့်ရန် function
    function displayData(data) {
        tableBody.innerHTML = "";
        
        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">မှတ်တမ်းမရှိသေးပါ</td></tr>`;
            return;
        }

        data.forEach(item => {
            const row = `
                <tr>
                    <td><b>${item.Name || '-'}</b></td>
                    <td><span class="badge">${item.Birthday_Name || '-'}</span></td>
                    <td>${formatDate(item.DOB)}</td>
                    <td>${item.Contact || '-'}</td>
                    <td>${item.Purpose || '-'}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    // Date Format ကို လူကြည့်ကောင်းအောင် ပြင်ရန် (ဥပမာ 37490 ကနေ ရက်စွဲပြောင်းရန်)
    function formatDate(val) {
        if (!val) return '-';
        // Excel date number ဖြစ်နေခဲ့ရင် ရှင်းဖို့
        if (!isNaN(val)) {
            let date = new Date((val - 25569) * 86400 * 1000);
            return date.toLocaleDateString('en-GB');
        }
        return val;
    }

    // Search လုပ်ရန်
    searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const filteredData = allData.filter(item => 
            item.Name.toLowerCase().includes(searchTerm)
        );
        displayData(filteredData);
    });

    // စတင်ချိန်တွင် ဒေတာခေါ်ယူပါ
    fetchData();
</script>

</body>
</html>
