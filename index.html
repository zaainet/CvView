<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>နောင်ထိပ်တင် - Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --gold: #ffcf40; }
        body { font-family: 'Pyidaungsu', serif; background-color: #0a0a0a; color: #fff; min-height: 100vh; }
        .gold-text { color: var(--gold); }
        .card-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        
        #wolf-gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pass-input { background: #111; border: 1px solid #222; border-radius: 12px; font-size: 20px; text-align: center; padding: 15px; width: 280px; color: var(--gold); outline: none; }
        
        /* ရှင်းလင်းပြတ်သားသော ခလုတ်ဒီဇိုင်း */
        .btn-status-on { background-color: #10b981; color: white; padding: 12px 30px; border-radius: 12px; font-weight: 900; transition: 0.3s; border: 2px solid transparent; }
        .btn-status-off { background-color: #ef4444; color: white; padding: 12px 30px; border-radius: 12px; font-weight: 900; transition: 0.3s; border: 2px solid transparent; }
        .active-status { border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.3); transform: scale(1.05); }
    </style>
</head>
<body id="main-body" class="p-4 md:p-8 overflow-hidden">

    <div id="wolf-gate">
        <i class="fa-solid fa-shield-cat text-5xl mb-6 text-zinc-800"></i>
        <h1 class="text-xl font-bold mb-6 tracking-widest">SAYARGYI အတည်ပြုချက်လိုအပ်သည်</h1>
        <input type="password" id="passkey" class="pass-input" placeholder="PASSWORD" onkeyup="checkAccess(event)">
    </div>

    <div id="admin-content" class="hidden max-w-4xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-2xl font-black gold-text uppercase">Control Panel</h1>
                <p id="systemStatus" class="text-xs text-zinc-500 mt-1 uppercase font-bold tracking-widest italic">Checking Server...</p>
            </div>

            <div class="card-glass p-3 flex gap-4">
                <button id="btnOpen" onclick="toggleSystem('Open')" class="btn-status-on">OPEN (ဖွင့်မယ်)</button>
                <button id="btnClose" onclick="toggleSystem('Closed')" class="btn-status-off">CLOSE (ပိတ်မယ်)</button>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card-glass p-6 text-center border-l-4 border-gold">
                <p class="text-[10px] text-zinc-500 font-bold uppercase mb-1">New Orders</p>
                <h2 id="pendingCount" class="text-4xl font-black gold-text">0</h2>
            </div>
            <button onclick="fetchData()" class="card-glass p-6 flex flex-col items-center justify-center hover:bg-zinc-800 transition">
                <i class="fa-solid fa-arrows-rotate text-2xl gold-text mb-2"></i>
                <span class="text-[10px] font-bold uppercase">Refresh Data</span>
            </button>
        </div>

        <div id="dataList" class="space-y-4">
            <div class="text-center py-20 opacity-20 italic">Loading database entries...</div>
        </div>

    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/hgitfd6aa9ymz";

        function checkAccess(e) {
            if (e.key === "Enter") {
                if (document.getElementById('passkey').value === "SAYARGYI") {
                    document.getElementById('wolf-gate').style.display = 'none';
                    document.getElementById('admin-content').classList.remove('hidden');
                    document.getElementById('main-body').classList.remove('overflow-hidden');
                    fetchData();
                } else {
                    Swal.fire({ title: 'မှားယွင်းသည်', text: 'ဆရာကြီး Password မဟုတ်ပါ။', icon: 'error', background: '#111', color: '#fff' });
                }
            }
        }

        async function fetchData() {
            try {
                // Fetching main data and switch status (Sheet2)
                const [resData, resSwitch] = await Promise.all([
                    fetch(API_URL),
                    fetch(`${API_URL}?sheet=Sheet2`)
                ]);
                
                const data = await resData.json();
                const switchConfig = await resSwitch.json();

                // Update Switch UI
                const currentStatus = switchConfig[0].Switch || switchConfig[0].Swith; // Supporting both spellings in your sheet
                document.getElementById('systemStatus').innerText = `System Status: ${currentStatus}`;
                
                document.getElementById('btnOpen').classList.toggle('active-status', currentStatus === 'Open');
                document.getElementById('btnClose').classList.toggle('active-status', currentStatus === 'Closed');

                // Render List
                const list = document.getElementById('dataList');
                list.innerHTML = "";
                document.getElementById('pendingCount').innerText = data.length;

                data.reverse().forEach(item => {
                    list.innerHTML += `
                        <div class="card-glass p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h3 class="text-lg font-bold">${item.အမည်} <span class="text-xs text-gold ml-2">${item.နေ့နံ}</span></h3>
                                <p class="text-sm text-zinc-400 mt-1"><i class="fa-solid fa-phone-volume mr-2"></i>${item.ဖုန်း}</p>
                                <p class="text-xs text-zinc-500 italic mt-1">${item.သိလိုသည်} | ${item.အချိန်}</p>
                            </div>
                            <div class="flex gap-2">
                                <a href="tel:${item.ဖုန်း}" class="p-3 bg-zinc-800 rounded-lg hover:bg-emerald-600 transition"><i class="fa-solid fa-phone"></i></a>
                                <button onclick="deleteRow('${item.ID}')" class="p-3 bg-zinc-800 rounded-lg hover:bg-red-600 transition"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>`;
                });

            } catch (err) { console.error(err); }
        }

        async function toggleSystem(newVal) {
            Swal.fire({ title: 'Updating...', didOpen: () => Swal.showLoading(), background: '#111', color: '#fff' });
            try {
                // Your sheet uses "Switch" or "Swith" (Based on your photo, cell A1 is "Swith")
                // We will update column A where it's not empty
                await fetch(`${API_URL}/Swith/Open?sheet=Sheet2`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"data": {"Swith": newVal, "Switch": newVal}})
                });
                fetchData();
                Swal.close();
            } catch (e) { Swal.fire('Error', 'Update Failed', 'error'); }
        }

        async function deleteRow(id) {
            const result = await Swal.fire({
                title: 'ဖျက်မှာ သေချာလား?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                background: '#111',
                color: '#fff'
            });
            if (result.isConfirmed) {
                await fetch(`${API_URL}/ID/${id}`, { method: 'DELETE' });
                fetchData();
            }
        }
    </script>
</body>
</html>
