<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>နောင်ထိပ်တင် - Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --gold: #ffcf40; --deep-gold: #b8860b; --dark-bg: #050505; }
        body { font-family: 'Pyidaungsu', serif; background-color: var(--dark-bg); color: #fff; }
        .card-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 207, 64, 0.1); border-radius: 20px; }
        
        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gold); }
        input:checked + .slider:before { transform: translateX(24px); }

        .search-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 20px; width: 100%; outline: none; }
        .tab-btn { padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: bold; transition: 0.3s; color: #888; }
        .tab-btn.active { background: var(--gold); color: #000; }
        
        .row-item { border-bottom: 1px solid rgba(255,255,255,0.03); }
        .done-status { opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body>

    <div id="wolf-gate" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center p-6">
        <div class="card-glass p-10 w-full max-w-sm text-center">
            <h1 class="text-2xl font-black text-gold mb-6 uppercase tracking-widest">SAYARGYI LOGIN</h1>
            <input type="password" id="passkey" class="search-input text-center mb-4" placeholder="PASSWORD" onkeyup="if(event.key==='Enter') login()">
            <button onclick="login()" class="w-full bg-gold text-black font-black py-3 rounded-xl">LOGIN</button>
        </div>
    </div>

    <div id="admin-content" class="hidden min-h-screen">
        <nav class="p-6 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50 border-b border-white/5">
            <h1 class="text-xl font-black text-gold">CONTROL PANEL</h1>
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-bold text-zinc-500 uppercase">စာရင်းလက်ခံမှု:</span>
                <label class="switch">
                    <input type="checkbox" id="systemToggle" onchange="toggleSystem()">
                    <span class="slider"></span>
                </label>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center">
                <div class="card-glass p-6"><p class="text-zinc-500 text-xs font-bold uppercase">စုစုပေါင်း</p><h2 id="totalCount" class="text-3xl font-black mt-2">0</h2></div>
                <div class="card-glass p-6 border-l-4 border-gold"><p class="text-zinc-500 text-xs font-bold uppercase">ကြည့်ရန်ကျန်</p><h2 id="pendingCount" class="text-3xl font-black text-gold mt-2">0</h2></div>
                <div class="card-glass p-6 border-l-4 border-green-500"><p class="text-zinc-500 text-xs font-bold uppercase">ပြီးစီး</p><h2 id="doneCount" class="text-3xl font-black text-green-500 mt-2">0</h2></div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <input type="text" id="searchInput" class="search-input flex-1" placeholder="နာမည် သို့မဟုတ် ဖုန်းဖြင့်ရှာရန်..." oninput="renderData()">
                <div class="flex bg-white/5 p-1 rounded-xl gap-1">
                    <button onclick="filterTab('all')" id="tab-all" class="tab-btn active">အားလုံး</button>
                    <button onclick="filterTab('pending')" id="tab-pending" class="tab-btn">ကျန်ရှိ</button>
                    <button onclick="filterTab('done')" id="tab-done" class="tab-btn">ပြီးစီး</button>
                </div>
            </div>

            <div class="card-glass overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-white/5 text-zinc-500 text-[10px] font-bold uppercase">
                            <tr>
                                <th class="p-4 text-left">အမည် / ဖုန်း</th>
                                <th class="p-4 text-left">အကြောင်းအရာ</th>
                                <th class="p-4 text-right">လုပ်ဆောင်ချက်</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody"></tbody>
                    </table>
                </div>
                <div id="loading" class="p-20 text-center opacity-50"><i class="fa-solid fa-spinner fa-spin text-2xl"></i><p class="mt-2 text-xs">Loading Data...</p></div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxKRQFaSMrqkvnCAiTpLuw3WowpBAfAIQHGaza8loAeCBoYQOrhLqsd2s0mERt7j3Xb9A/exec";
        let rawData = [];
        let currentTab = 'all';

        function login() {
            if (document.getElementById('passkey').value === "SAYARGYI") {
                document.getElementById('wolf-gate').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                refreshData();
            } else { Swal.fire('Error', 'စကားဝှက် မှားယွင်းပါသည်။', 'error'); }
        }

        async function refreshData() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(API_URL);
                const result = await res.json();
                rawData = result.data.reverse();
                document.getElementById('systemToggle').checked = result.switch === "Open";
                renderData();
            } catch (e) { console.error(e); }
            document.getElementById('loading').classList.add('hidden');
        }

        function renderData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = "";

            let filtered = rawData.filter(item => {
                const matchSearch = item.အမည်.toLowerCase().includes(searchTerm) || item.ဖုန်း.toString().includes(searchTerm);
                const isDone = item.Status === "Done";
                if (currentTab === 'pending') return matchSearch && !isDone;
                if (currentTab === 'done') return matchSearch && isDone;
                return matchSearch;
            });

            document.getElementById('totalCount').innerText = rawData.length;
            document.getElementById('pendingCount').innerText = rawData.filter(i => i.Status !== "Done").length;
            document.getElementById('doneCount').innerText = rawData.filter(i => i.Status === "Done").length;

            filtered.forEach(item => {
                const isDone = item.Status === "Done";
                tbody.innerHTML += `
                    <tr class="row-item ${isDone ? 'done-status' : ''}">
                        <td class="p-4">
                            <div class="font-bold text-gold text-sm">${item.အမည်}</div>
                            <div class="text-[11px] text-zinc-500">${item.ဖုန်း} (${item.နေ့နံ})</div>
                        </td>
                        <td class="p-4"><span class="text-xs bg-white/5 px-2 py-1 rounded">${item.သိလိုသည်}</span></td>
                        <td class="p-4 text-right">
                            <div class="flex justify-end gap-2">
                                <button onclick="markStatus('${item.ID}', '${isDone ? 'Pending' : 'Done'}')" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-green-500">
                                    <i class="fa-solid ${isDone ? 'fa-rotate-left' : 'fa-check'}"></i>
                                </button>
                                <button onclick="deleteData('${item.ID}')" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-red-500">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        async function toggleSystem() {
            const val = document.getElementById('systemToggle').checked ? "Open" : "Closed";
            await fetch(`${API_URL}?action=updateSwitch`, {
                method: 'POST',
                body: JSON.stringify({ status: val })
            });
            Swal.fire({ title: 'System ' + val, icon: 'success', timer: 1000, showConfirmButton: false });
        }

        async function markStatus(id, status) {
            Swal.showLoading();
            await fetch(`${API_URL}?action=updateStatus`, {
                method: 'POST',
                body: JSON.stringify({ id: id, status: status })
            });
            refreshData();
            Swal.close();
        }

        async function deleteData(id) {
            if (confirm('ဖျက်မှာ သေချာလား?')) {
                Swal.showLoading();
                await fetch(`${API_URL}?action=delete`, {
                    method: 'POST',
                    body: JSON.stringify({ id: id })
                });
                refreshData();
                Swal.close();
            }
        }

        function filterTab(type) {
            currentTab = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            renderData();
        }
    </script>
</body>
</html>
