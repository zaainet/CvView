<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>နောင်ထိပ်တင် - Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --gold: #ffcf40; }
        body { font-family: 'Pyidaungsu', serif; background-color: #0a0a0a; color: #fff; }
        .card-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        .btn-status-on { background-color: #10b981; color: white; padding: 12px 25px; border-radius: 12px; font-weight: 900; transition: 0.3s; opacity: 0.4; }
        .btn-status-off { background-color: #ef4444; color: white; padding: 12px 25px; border-radius: 12px; font-weight: 900; transition: 0.3s; opacity: 0.4; }
        .active-status { opacity: 1 !important; transform: scale(1.05); border: 2px solid white; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="wolf-gate" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center">
        <h1 class="text-xl font-bold mb-6 tracking-widest text-gold">SAYARGYI LOGIN</h1>
        <input type="password" id="passkey" class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-center text-gold outline-none" placeholder="PASSWORD" onkeyup="if(event.key==='Enter') login()">
    </div>

    <div id="admin-content" class="hidden max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black text-gold">ADMIN DASHBOARD</h1>
                <p id="currentStatusDisp" class="text-[10px] text-zinc-500 font-bold mt-1 uppercase italic">Syncing...</p>
            </div>
            <div class="card-glass p-2 flex gap-3">
                <button id="btnOpen" onclick="updateSystem('Open')" class="btn-status-on">OPEN</button>
                <button id="btnClose" onclick="updateSystem('Closed')" class="btn-status-off">CLOSE</button>
            </div>
        </header>

        <div id="dataList" class="space-y-4">
            <div class="text-center py-20 opacity-20 italic">Loading database...</div>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/hgitfd6aa9ymz";

        function login() {
            if (document.getElementById('passkey').value === "SAYARGYI") {
                document.getElementById('wolf-gate').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                refreshAll();
            } else {
                Swal.fire('မှားယွင်းသည်', 'စကားဝှက် ပြန်စစ်ပါ။', 'error');
            }
        }

        async function refreshAll() {
            try {
                // Get Switch Status from Sheet2
                const resConf = await fetch(`${API_URL}?sheet=Sheet2`);
                const conf = await resConf.json();
                const status = conf[0].Switch;
                
                document.getElementById('currentStatusDisp').innerText = `SYSTEM IS: ${status}`;
                document.getElementById('btnOpen').classList.toggle('active-status', status === 'Open');
                document.getElementById('btnClose').classList.toggle('active-status', status === 'Closed');

                // Get Submissions from Sheet1
                const resData = await fetch(API_URL);
                const data = await resData.json();
                const list = document.getElementById('dataList');
                list.innerHTML = "";
                
                data.reverse().forEach(item => {
                    list.innerHTML += `
                        <div class="card-glass p-5 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-gold">${item.အမည်} <span class="text-[10px] text-white/40 ml-2">(${item.နေ့နံ})</span></h3>
                                <p class="text-xs text-zinc-400 mt-1">${item.ဖုန်း} | ${item.သိလိုသည်}</p>
                            </div>
                            <button onclick="deleteRow('${item.ID}')" class="text-zinc-600 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button>
                        </div>`;
                });
            } catch (e) { console.log(e); }
        }

        async function updateSystem(val) {
            Swal.showLoading();
            try {
                // အကွက် A1 မှာ 'Switch' ဖြစ်နေတဲ့ Row ကို ရှာပြီး Value ကို Update လုပ်တာပါ
                await fetch(`${API_URL}/Switch/Switch?sheet=Sheet2`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"data": {"Switch": val}})
                });
                await refreshAll();
                Swal.close();
            } catch (e) { Swal.fire('Error', 'မအောင်မြင်ပါ', 'error'); }
        }

        async function deleteRow(id) {
            if (confirm('ဖျက်မှာ သေချာလား?')) {
                await fetch(`${API_URL}/ID/${id}`, { method: 'DELETE' });
                refreshAll();
            }
        }
    </script>
</body>
</html>
