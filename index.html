<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>နောင်ထိပ်တင် - Master Admin Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Pyidaungsu', serif; background-color: #050505; color: #eee; }
        .gold-text { color: #ffcf40; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 207, 64, 0.1); border-radius: 20px; }
        .btn-action { transition: 0.3s; padding: 10px 15px; border-radius: 12px; font-size: 12px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        tr { background: rgba(255, 255, 255, 0.02); transition: 0.3s; }
        tr:hover { background: rgba(255, 255, 255, 0.05); }
        td { padding: 16px; border-top: 1px solid rgba(255,255,255,0.02); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black gold-text tracking-tighter">ADMIN COMMAND</h1>
                <p class="text-white/40 text-sm italic">“ စာရင်းချုပ်ရန်နှင့် စီမံရန် နေရာ ”</p>
            </div>
            <div class="text-right">
                <span class="bg-green-500 text-black text-[10px] px-2 py-1 rounded font-black">LIVE SERVER</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card p-6 relative overflow-hidden">
                <div class="absolute right-[-10px] top-[-10px] opacity-10 text-6xl text-amber-500"><i class="fa-solid fa-hourglass-half"></i></div>
                <p class="text-[10px] text-white/30 uppercase tracking-[2px]">လက်ရှိကျန်သူ (Pending)</p>
                <h2 id="pendingCount" class="text-5xl font-black gold-text mt-2">0</h2>
            </div>
            <div class="card p-6 relative overflow-hidden">
                <div class="absolute right-[-10px] top-[-10px] opacity-10 text-6xl text-green-500"><i class="fa-solid fa-circle-check"></i></div>
                <p class="text-[10px] text-white/30 uppercase tracking-[2px]">ပြီးစီးသူ (Done)</p>
                <h2 id="doneCount" class="text-5xl font-black text-green-500 mt-2">0</h2>
            </div>
            <button onclick="fetchData()" class="card p-6 flex flex-col items-center justify-center hover:bg-gold/10 group transition">
                <i class="fa-solid fa-rotate text-3xl gold-text group-hover:rotate-180 transition duration-500"></i>
                <span class="mt-2 font-bold uppercase text-[10px] gold-text">Refresh Database</span>
            </button>
        </div>

        <div class="overflow-x-auto">
            <table id="masterTable">
                <thead>
                    <tr class="bg-transparent text-[11px] text-gold/50 uppercase tracking-[3px]">
                        <th class="p-4 text-left">အချက်အလက်</th>
                        <th class="p-4 text-left">ကဏ္ဍ</th>
                        <th class="p-4 text-left">အခြေအနေ</th>
                        <th class="p-4 text-right">စီမံရန်</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" class="text-center py-20 opacity-20 italic">Database မှ စာရင်းများကို ချိတ်ဆက်နေပါသည်...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/hgitfd6aa9ymz";

        async function fetchData() {
            const tbody = document.getElementById('tableBody');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if(!Array.isArray(data)) throw new Error("Invalid Data");

                const pending = data.filter(i => i.Status !== "Done");
                const done = data.filter(i => i.Status === "Done");
                
                document.getElementById('pendingCount').innerText = pending.length;
                document.getElementById('doneCount').innerText = done.length;

                tbody.innerHTML = "";
                
                data.reverse().forEach(item => {
                    const isDone = item.Status === "Done";
                    tbody.innerHTML += `
                        <tr class="${isDone ? 'opacity-30' : 'opacity-100'}">
                            <td>
                                <div class="font-bold text-white text-lg">${item.အမည် || 'အမည်မသိ'}</div>
                                <div class="text-[12px] text-white/40 font-bold">${item.နေ့နံ || '-'} | <a href="tel:${item.ဖုန်း}" class="text-gold underline">${item.ဖုန်း || '-'}</a></div>
                                <div class="text-[10px] text-white/20 mt-1">${item.အချိန် || '-'}</div>
                            </td>
                            <td><span class="text-gold font-bold text-sm">${item.သိလိုသည် || '-'}</span></td>
                            <td>
                                <span class="status-badge ${isDone ? 'bg-green-500 text-black' : 'bg-amber-500 text-black'}">
                                    ${isDone ? 'Done' : 'Waiting'}
                                </span>
                            </td>
                            <td class="text-right">
                                <div class="flex justify-end gap-2">
                                    ${!isDone ? `
                                    <button onclick="updateStatus('${item.ID}', 'Done')" class="btn-action bg-green-500 text-black hover:bg-green-400">
                                        <i class="fa-solid fa-check"></i> ပြီးပြီ
                                    </button>` : ''}
                                    <button onclick="deleteRow('${item.ID}')" class="btn-action bg-red-600/20 text-red-500 border border-red-500/20 hover:bg-red-600 hover:text-white">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-20 text-red-500">ချိတ်ဆက်မှု မအောင်မြင်ပါ။ API URL သို့မဟုတ် Sheet Column များကို စစ်ဆေးပါ။</td></tr>`;
            }
        }

        async function updateStatus(id, status) {
            Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            try {
                await fetch(`${API_URL}/ID/${id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"data": {"Status": status}})
                });
                Swal.close();
                fetchData();
            } catch (e) { Swal.fire('Error', 'Update လုပ်မရပါ', 'error'); }
        }

        async function deleteRow(id) {
            const result = await Swal.fire({
                title: 'ဖျက်မှာ သေချာလား?',
                text: "ဒီစာရင်းကို Database ထဲက လုံးဝဖျက်ထုတ်မှာ ဖြစ်ပါတယ်။",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'ဖျက်မည်',
                background: '#111', color: '#fff'
            });

            if (result.isConfirmed) {
                Swal.fire({ title: 'Deleting...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                try {
                    await fetch(`${API_URL}/ID/${id}`, { method: 'DELETE' });
                    Swal.close();
                    fetchData();
                } catch (e) { Swal.fire('Error', 'ဖျက်လို့မရပါ', 'error'); }
            }
        }

        fetchData();
    </script>
</body>
</html>
