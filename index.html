<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ဧည့်တွေ့စာရင်း- Admin Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { 
            --gold: #ffcf40; 
            --deep-gold: #b8860b; 
            --dark-bg: #0a0a0a; 
        }
        
        body { 
            font-family: 'Pyidaungsu', serif; 
            background: var(--dark-bg); 
            color: #e5e7eb;
            background-image: radial-gradient(circle at 10% 20%, #1a1a0a, #000);
            min-height: 100vh;
        }

        .glass-card { 
            background: rgba(20, 20, 20, 0.8); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 207, 64, 0.15); 
            border-radius: 24px; 
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #ffcf40; border-radius: 10px; }

        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #3f3f46; transition: .3s; border-radius: 34px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; 
            background-color: white; transition: .3s; border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--gold); }
        input:checked + .slider:before { transform: translateX(26px); }

        .tab-active { 
            background: var(--gold) !important; 
            color: #000 !important; 
            box-shadow: 0 4px 15px rgba(255, 207, 64, 0.2);
        }

        .status-pending { border-left: 3px solid #ffcf40; }
        .status-done { border-left: 3px solid #22c55e; opacity: 0.6; filter: grayscale(0.3); }
        
        .btn-action {
            transition: all 0.2s;
        }
        .btn-action:active { transform: scale(0.95); }

        /* Login Overlay */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Login Overlay -->
    <div id="loginOverlay">
        <div class="glass-card p-8 w-80 text-center">
            <i class="fa-solid fa-crown text-5xl text-gold mb-4"></i>
            <h2 class="text-xl font-bold mb-4">Admin Login</h2>
            <input type="password" id="adminPassword" class="w-full bg-black/50 border border-gold/30 rounded-xl p-3 mb-4 text-white" placeholder="စကားဝှက်ထည့်ပါ">
            <button onclick="checkLogin()" class="w-full bg-gold text-black font-bold py-3 rounded-xl">ဝင်ရောက်မည်</button>
            <p class="text-xs text-zinc-500 mt-4">* အကယ်၍ စကားဝှက်မသိပါက ဆရာနောင်ထိပ်တင်အား ဆက်သွယ်ပါ။</p>
        </div>
    </div>

    <!-- Main Dashboard (Hidden until login) -->
    <div id="dashboard" style="display: none;">
        <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-gold/20">
            <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gold rounded-xl flex items-center justify-center text-black shadow-lg">
                        <i class="fa-solid fa-crown text-xl"></i>
                    </div>
                    <h1 class="text-lg font-bold">နောင်ထိပ်တင် <span class="text-gold">Admin</span></h1>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full">
                        <span class="text-[10px] text-zinc-400">System Status</span>
                        <label class="switch">
                            <input type="checkbox" id="systemToggle" onchange="toggleSystemStatus()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button onclick="logout()" class="text-red-400 hover:text-red-300 text-sm">
                        <i class="fa-solid fa-sign-out-alt"></i> <span class="hidden sm:inline">ထွက်ရန်</span>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 space-y-6">
            <!-- Stats Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-card p-4 text-center">
                    <i class="fa-solid fa-users text-2xl text-blue-400 mb-2"></i>
                    <p class="text-2xl font-black" id="totalCount">0</p>
                    <p class="text-[10px] text-zinc-400 uppercase">စုစုပေါင်း</p>
                </div>
                <div class="glass-card p-4 text-center border-l-4 border-gold">
                    <i class="fa-solid fa-hourglass-half text-2xl text-gold mb-2"></i>
                    <p class="text-2xl font-black text-gold" id="pendingCount">0</p>
                    <p class="text-[10px] text-zinc-400 uppercase">ကြည့်ရန်ကျန်</p>
                </div>
                <div class="glass-card p-4 text-center border-l-4 border-green-500">
                    <i class="fa-solid fa-check-circle text-2xl text-green-500 mb-2"></i>
                    <p class="text-2xl font-black text-green-500" id="doneCount">0</p>
                    <p class="text-[10px] text-zinc-400 uppercase">ပြီးစီး</p>
                </div>
                <div class="glass-card p-4 text-center">
                    <i class="fa-solid fa-phone text-2xl text-purple-400 mb-2"></i>
                    <p class="text-sm font-bold" id="phoneDisplay">09666664580</p>
                    <p class="text-[10px] text-zinc-400 uppercase">Admin Phone</p>
                </div>
            </div>

            <!-- Search & Filters -->
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="relative w-full md:w-96">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-sm"></i>
                    <input type="text" id="searchInput" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 focus:border-gold outline-none text-sm" placeholder="အမည် သို့မဟုတ် ဖုန်းဖြင့်ရှာရန်..." oninput="filterData()">
                </div>
                
                <div class="flex gap-2">
                    <button onclick="setFilter('all')" id="filterAll" class="px-5 py-2 rounded-xl text-xs font-bold transition-all bg-gold text-black">အားလုံး</button>
                    <button onclick="setFilter('pending')" id="filterPending" class="px-5 py-2 rounded-xl text-xs font-bold transition-all bg-white/10 text-zinc-400">ကျန်ရှိ</button>
                    <button onclick="setFilter('done')" id="filterDone" class="px-5 py-2 rounded-xl text-xs font-bold transition-all bg-white/10 text-zinc-400">ပြီးစီး</button>
                    <button onclick="fetchData()" class="px-4 py-2 rounded-xl bg-white/5 text-gold hover:bg-gold/20">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
            </div>

            <!-- Data Table -->
            <div class="glass-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 border-b border-white/10">
                            <tr class="text-[10px] text-zinc-400 uppercase tracking-wider">
                                <th class="p-4">အမည် / ဖုန်း</th>
                                <th class="p-4">နေ့နံ</th>
                                <th class="p-4">အကြောင်းအရာ</th>
                                <th class="p-4">အချိန်</th>
                                <th class="p-4 text-center">လုပ်ဆောင်ချက်</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="5" class="text-center py-10">
                                    <i class="fa-solid fa-spinner fa-spin text-2xl text-gold"></i>
                                    <p class="text-zinc-500 text-sm mt-2">ဒေတာများ ရယူနေပါသည်...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURATION
        const SHEETDB_API = "https://sheetdb.io/api/v1/hgitfd6aa9ymz";
        const ADMIN_PASSWORD = "999999999"; // Change this to your desired password
        
        let allData = [];
        let currentFilter = "all";
        
        // Check Login
        function checkLogin() {
            const pwd = document.getElementById('adminPassword').value;
            if(pwd === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchData();
            } else {
                Swal.fire({
                    title: 'မှားယွင်းနေပါသည်',
                    text: 'စကားဝှက်ကို ပြန်လည်စစ်ဆေးပါ။',
                    icon: 'error',
                    background: '#0a0a0a',
                    color: '#fff'
                });
            }
        }
        
        // Check existing session
        if(localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            fetchData();
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }
        
        // Fetch data from SheetDB
        async function fetchData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-2xl text-gold"></i><p class="text-zinc-500 text-sm mt-2">ဒေတာများ ရယူနေပါသည်...</p></td></tr>`;
            
            try {
                // Fetch main data
                const res = await fetch(SHEETDB_API);
                let data = await res.json();
                allData = Array.isArray(data) ? data : [];
                
                // Fetch status from Sheet2
                const statusRes = await fetch(`${SHEETDB_API}?sheet=Sheet2`);
                const statusData = await statusRes.json();
                const systemStatus = statusData[0]?.Switch === "Open";
                document.getElementById('systemToggle').checked = systemStatus;
                
                updateStats();
                filterData();
            } catch(err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-red-400"><i class="fa-solid fa-circle-exclamation text-2xl"></i><p class="text-sm mt-2">Connection error. Please refresh.</p></td></tr>`;
            }
        }
        
        // Update statistics
        function updateStats() {
            const total = allData.length;
            const pending = allData.filter(item => item.Status !== "Done").length;
            const done = allData.filter(item => item.Status === "Done").length;
            
            document.getElementById('totalCount').innerText = total;
            document.getElementById('pendingCount').innerText = pending;
            document.getElementById('doneCount').innerText = done;
        }
        
        // Filter data based on search and status
        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = [...allData];
            
            // Filter by status
            if(currentFilter === 'pending') {
                filtered = filtered.filter(item => item.Status !== "Done");
            } else if(currentFilter === 'done') {
                filtered = filtered.filter(item => item.Status === "Done");
            }
            
            // Filter by search
            if(searchTerm) {
                filtered = filtered.filter(item => 
                    (item.အမည် && item.အမည်.toLowerCase().includes(searchTerm)) ||
                    (item.ဖုန်း && item.ဖုန်း.toString().includes(searchTerm))
                );
            }
            
            renderTable(filtered);
        }
        
        // Render table
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-zinc-500"><i class="fa-solid fa-inbox text-3xl mb-2"></i><p>စာရင်းမရှိပါ</p></td></tr>`;
                return;
            }
            
            tbody.innerHTML = data.map(item => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-all ${item.Status === 'Done' ? 'status-done' : 'status-pending'}">
                    <td class="p-4">
                        <div class="font-bold text-white">${escapeHtml(item.အမည် || '-')}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-xs text-zinc-400"><i class="fa-solid fa-phone mr-1"></i> ${item.ဖုန်း || '-'}</span>
                            ${item.ဖုန်း ? `<button onclick="copyPhone('${item.ဖုန်း}')" class="text-[9px] bg-white/10 px-2 py-0.5 rounded hover:bg-gold hover:text-black"><i class="fa-regular fa-copy"></i></button>` : ''}
                        </div>
                    </td>
                    <td class="p-4">
                        <span class="text-xs text-gold/70 bg-gold/10 px-2 py-1 rounded-full">${item.နေ့နံ || '-'}</span>
                    </td>
                    <td class="p-4">
                        <div class="text-sm text-zinc-300 max-w-xs">${escapeHtml(item.သိလိုသည် || '-')}</div>
                    </td>
                    <td class="p-4">
                        <span class="text-[10px] text-zinc-500">${item.အချိန် || '-'}</span>
                    </td>
                    <td class="p-4 text-center">
                        <div class="flex justify-center gap-2">
                            ${item.Status !== 'Done' ? 
                                `<button onclick="markDone('${item.ID}')" class="btn-action w-8 h-8 rounded-lg bg-green-500/20 text-green-500 hover:bg-green-500 hover:text-white" title="ပြီးစီးမှတ်မည်">
                                    <i class="fa-solid fa-check text-xs"></i>
                                </button>` :
                                `<button onclick="markPending('${item.ID}')" class="btn-action w-8 h-8 rounded-lg bg-yellow-500/20 text-yellow-500 hover:bg-yellow-500 hover:text-black" title="ပြန်ဖွင့်မည်">
                                    <i class="fa-solid fa-undo text-xs"></i>
                                </button>`
                            }
                            <button onclick="deleteEntry('${item.ID}')" class="btn-action w-8 h-8 rounded-lg bg-red-500/20 text-red-500 hover:bg-red-500 hover:text-white" title="ဖျက်မည်">
                                <i class="fa-solid fa-trash text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        // Mark as Done
        async function markDone(id) {
            const result = await Swal.fire({
                title: 'ပြီးစီးကြောင်း မှတ်သားမည်?',
                text: 'ဤအကြောင်းအရာကို ဖြေကြားပြီးပါက Done မှတ်ပါ။',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'ဟုတ်ကဲ့',
                cancelButtonText: 'မလုပ်တော့ပါ',
                background: '#0a0a0a',
                color: '#fff'
            });
            
            if(result.isConfirmed) {
                await updateStatus(id, "Done");
            }
        }
        
        // Mark as Pending
        async function markPending(id) {
            await updateStatus(id, "Pending");
        }
        
        // Update status in SheetDB
        async function updateStatus(id, status) {
            try {
                const res = await fetch(`${SHEETDB_API}/ID/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "Status": status })
                });
                
                if(res.ok) {
                    Swal.fire({
                        title: 'အောင်မြင်ပါသည်',
                        text: `စာရင်းအား ${status === 'Done' ? 'ပြီးစီးသည်' : 'ပြန်လည်ဖွင့်သည်'} ဟု မှတ်သားပြီးပါပြီ။`,
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false,
                        background: '#0a0a0a',
                        color: '#fff'
                    });
                    fetchData();
                }
            } catch(err) {
                Swal.fire('Error', 'အဆက်အသွယ် ချို့ယွင်းနေပါသည်', 'error');
            }
        }
        
        // Delete entry
        async function deleteEntry(id) {
            const result = await Swal.fire({
                title: 'ဖျက်ပစ်မည်!',
                text: 'ဤစာရင်းကို အပြီးအပိုင် ဖျက်ပစ်မည်။ ပြန်လည်၍မရနိုင်ပါ။',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ဖျက်မည်',
                cancelButtonText: 'မဖျက်တော့ပါ',
                background: '#0a0a0a',
                color: '#fff'
            });
            
            if(result.isConfirmed) {
                try {
                    const res = await fetch(`${SHEETDB_API}/ID/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if(res.ok) {
                        Swal.fire('ဖျက်ပြီးပါပြီ', '', 'success');
                        fetchData();
                    }
                } catch(err) {
                    Swal.fire('Error', 'ဖျက်၍မရပါ', 'error');
                }
            }
        }
        
        // Toggle system status (Open/Close)
        async function toggleSystemStatus() {
            const isOpen = document.getElementById('systemToggle').checked;
            const statusValue = isOpen ? "Open" : "Closed";
            
            try {
                // First, get existing Sheet2 data
                const getRes = await fetch(`${SHEETDB_API}?sheet=Sheet2`);
                let existing = await getRes.json();
                
                if(existing && existing[0]) {
                    // Update existing
                    await fetch(`${SHEETDB_API}/ID/${existing[0].ID}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ "Switch": statusValue })
                    });
                } else {
                    // Create new
                    await fetch(SHEETDB_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ "data": [{ "ID": 1, "Switch": statusValue }] })
                    });
                }
                
                Swal.fire({
                    title: statusValue === 'Open' ? 'စာရင်းလက်ခံနေပါသည်' : 'စာရင်းလက်ခံမှုပိတ်ထားပါသည်',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#0a0a0a',
                    color: '#fff'
                });
            } catch(err) {
                console.error(err);
                Swal.fire('Error', 'System status update failed', 'error');
            }
        }
        
        // Set filter
        function setFilter(filter) {
            currentFilter = filter;
            
            // Update button styles
            document.getElementById('filterAll').className = filter === 'all' ? 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-gold text-black' : 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-white/10 text-zinc-400';
            document.getElementById('filterPending').className = filter === 'pending' ? 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-gold text-black' : 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-white/10 text-zinc-400';
            document.getElementById('filterDone').className = filter === 'done' ? 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-gold text-black' : 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-white/10 text-zinc-400';
            
            filterData();
        }
        
        // Copy phone number
        function copyPhone(phone) {
            navigator.clipboard.writeText(phone);
            Swal.fire({
                title: 'ကော်ပီကူးပြီးပါပြီ',
                text: phone,
                icon: 'success',
                timer: 1000,
                showConfirmButton: false,
                background: '#0a0a0a',
                color: '#fff'
            });
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        // Refresh button
        window.fetchData = fetchData;
    </script>
</body>
    </html>
